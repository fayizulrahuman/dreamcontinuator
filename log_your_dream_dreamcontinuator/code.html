            color: #e5e3ff;
            font-family: 'Newsreader', serif;
            min-height: 100vh;
            overflow-x: hidden;

        .dream-glow {
            position: fixed;

            height: 80vh;

            position: absolute;

            right: 5%;

            height: 400px;

            z-index: -1;

<div class="flex items-center gap-3">

<div class="flex items-center gap-6">

<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
